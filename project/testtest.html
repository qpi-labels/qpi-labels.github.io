<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Miku Otamatone - V10.7 C6 Optimized</title>
    <style>
        :root {
            --miku: #39C5BB;
            --miku-bright: #00fff2;
            --miku-dark: #00857d;
            --bg: #ffffff;
        }

        body {
            margin: 0; background-color: var(--bg); color: var(--miku-dark);
            font-family: -apple-system, system-ui, sans-serif;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden; 
            user-select: none; -webkit-user-select: none; -webkit-touch-callout: none;
            touch-action: none;
        }

        /* 💡 시동 버튼 시인성 및 클릭 보장 */
        #start-btn {
            padding: 25px 70px; background: var(--miku); border: none;
            color: #fff; font-size: 1.6rem; font-weight: 900;
            cursor: pointer; border-radius: 99px; z-index: 9999; 
            box-shadow: 0 15px 45px rgba(57, 197, 187, 0.6);
            transition: 0.2s; letter-spacing: 2px;
        }
        #start-btn:hover { background: var(--miku-dark); transform: scale(1.05); }
        #start-btn:active { transform: scale(0.95); }

        #pitch-board {
            position: absolute; left: 40px; top: 5%; height: 90%; width: 85px;
            border-right: 2px solid #e0f2f1; z-index: 10; cursor: ns-resize;
        }
        .tick { 
            position: absolute; right: 0; width: 8px; border-bottom: 1px solid #e2e8f0;
            display: flex; align-items: center; transform: translateY(50%);
        }
        .tick.natural { width: 22px; border-color: #b2dfdb; }
        .tick.c-note { width: 55px; border-color: var(--miku); border-width: 3px; }
        .tick-label { 
            position: absolute; left: -45px; font-size: 0.7rem; color: #94a3b8; font-weight: 700;
        }
        .tick.c-note .tick-label { color: var(--miku); font-size: 1rem; left: -55px; }

        #pitch-indicator {
            position: absolute; right: -15px; width: 50px; height: 6px;
            background-color: var(--miku-bright); bottom: 50%; z-index: 5;
            box-shadow: 0 0 25px var(--miku-bright); pointer-events: none;
        }

        #face-container { display: flex; flex-direction: column; align-items: center; margin-left: 60px; visibility: hidden; opacity: 0; transition: opacity 0.5s; }
        #face {
            width: 260px; height: 260px; background: #fff; border: 7px solid var(--miku); border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .playing { transform: scale(1.08); border-color: var(--miku-bright) !important; box-shadow: 0 0 100px rgba(57, 197, 187, 0.4); }

        #mouth { width: 95px; height: 12px; background: var(--miku-dark); border-radius: 50px; position: relative; overflow: hidden; }
        #tongue { width: 60px; height: 45px; background: #ff9090; border-radius: 50%; position: absolute; bottom: -30px; left: 17.5px; opacity: 0; }

        .info-panel { margin-top: 40px; text-align: center; }
        #note-display { font-size: 4.5rem; font-weight: 100; color: var(--miku-dark); margin-bottom: 5px; letter-spacing: -0.1em; }
        .status-text { color: var(--miku); font-weight: 900; font-size: 0.85rem; letter-spacing: 2px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <button id="start-btn">미쿠 엔진 V10.7 기동</button>

    <div id="pitch-board"><div id="pitch-indicator"></div></div>

    <div id="face-container">
        <div id="face">
            <div style="display:flex; gap:50px; margin-bottom:30px;">
                <div style="width:18px; height:18px; background:var(--miku-dark); border-radius:50%;"></div>
                <div style="width:18px; height:18px; background:var(--miku-dark); border-radius:50%;"></div>
            </div>
            <div id="mouth"><div id="tongue"></div></div>
        </div>
        <div class="info-panel">
            <div id="note-display">--</div>
            <div class="status-text">C6 SWEET-SPOT TUNED | RANGE: C4-C8</div>
            <div style="margin-top:10px; font-size: 0.75rem; color: #94a3b8; font-weight: 600;">DRAG VERTICAL: PITCH | DRAG HORIZONTAL: MOUTH</div>
        </div>
    </div>

    <script>
        let audioCtx, carrier, modulator, modGain, masterGain, airShelf;
        let formants = [];
        let isStarted = false;
        let isPlaying = false;
        let currentPitchRatio = 0.45; 
        let currentMouthRatio = 0.5;
        const notesArr = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];

        // 💡 음역대 대폭 확장: C4(60) ~ C8(108)
        const MIN_MIDI = 60;
        const MIDI_RANGE = 48; // 4옥타브

        async function initAudio() {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') await audioCtx.resume();

                carrier = audioCtx.createOscillator(); carrier.type = 'sine';
                modulator = audioCtx.createOscillator(); modulator.type = 'sawtooth';
                modGain = audioCtx.createGain();

                const bufferSize = audioCtx.sampleRate * 2;
                const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const output = noiseBuffer.getChannelData(0);
                for (let i = 0; i < output.length; i++) output[i] = Math.random() * 2 - 1;
                const noiseSrc = audioCtx.createBufferSource(); noiseSrc.buffer = noiseBuffer; noiseSrc.loop = true;
                
                const noiseFilter = audioCtx.createBiquadFilter(); noiseFilter.type = 'highpass'; noiseFilter.frequency.value = 10000;
                const breathNode = audioCtx.createGain(); breathNode.gain.value = 0.04;

                const vibrato = audioCtx.createOscillator(); vibrato.frequency.value = 6.45;
                const vGain = audioCtx.createGain(); vGain.gain.value = 3.8;
                vibrato.connect(vGain); vibrato.start();
                vGain.connect(carrier.frequency); vGain.connect(modulator.frequency);

                const formantFreqs = [800, 1500, 3900, 5500, 8500];
                let lastNode = null;
                formantFreqs.forEach((freq, i) => {
                    const f = audioCtx.createBiquadFilter(); f.type = 'peaking'; f.frequency.value = freq;
                    f.Q.value = i === 2 ? 22 : 12; f.gain.value = i >= 2 ? 22 : 14; 
                    formants.push(f);
                    if (lastNode) lastNode.connect(f);
                    else {
                        modulator.connect(modGain); modGain.connect(carrier.frequency);
                        carrier.connect(f);
                        noiseSrc.connect(noiseFilter); noiseFilter.connect(breathNode); breathNode.connect(f);
                    }
                    lastNode = f;
                });

                airShelf = audioCtx.createBiquadFilter(); airShelf.type = 'highshelf'; airShelf.frequency.value = 8500;
                masterGain = audioCtx.createGain(); masterGain.gain.value = 0;
                lastNode.connect(airShelf); airShelf.connect(masterGain); masterGain.connect(audioCtx.destination);

                carrier.start(); modulator.start(); noiseSrc.start();
                updateEngine();
                return true;
            } catch (err) {
                console.error("Engine Start Failed:", err);
                return false;
            }
        }

        function updateEngine() {
            requestAnimationFrame(updateEngine);
            if (!isStarted) return;

            // 주파수 계산 (C4 = 261.63Hz)
            let freq = 261.63 * Math.pow(2, currentPitchRatio * (MIDI_RANGE / 12)); 
            carrier.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.01);
            modulator.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.01);

            // 💡 C6 최적화 로직 (C6 = 1046.5Hz)
            // 주파수가 C6에 가까울수록 변조 깊이와 포먼트 피크를 날카롭게 조절
            let distToC6 = Math.abs(Math.log2(freq / 1046.5));
            let mikuFactor = Math.max(0, 1 - distToC6); // C6에서 1.0, 멀어지면 0
            
            modGain.gain.setTargetAtTime(freq * (1.0 + mikuFactor * 0.3), audioCtx.currentTime, 0.01);
            if(formants[2]) formants[2].Q.setTargetAtTime(22 + mikuFactor * 15, audioCtx.currentTime, 0.01);

            document.getElementById('pitch-indicator').style.bottom = (currentPitchRatio * 100) + '%';
            const semitones = Math.round(12 * Math.log2(freq / 440)) + 57; 
            document.getElementById('note-display').innerText = notesArr[semitones % 12] + (Math.floor(semitones / 12));

            document.getElementById('mouth').style.height = (12 + (currentMouthRatio * 95)) + 'px';
            document.getElementById('tongue').style.opacity = currentMouthRatio > 0.3 ? 1 : 0;
            if(airShelf) {
                airShelf.gain.setTargetAtTime(14 + (currentMouthRatio * 20), audioCtx.currentTime, 0.01);
                formants[2].gain.setTargetAtTime(22 + (currentMouthRatio * 12), audioCtx.currentTime, 0.01);
            }
        }

        function handlePointer(x, y) {
            currentMouthRatio = Math.max(0, Math.min(1, x / window.innerWidth));
            currentPitchRatio = Math.max(0, Math.min(1, 1 - (y - window.innerHeight * 0.05) / (window.innerHeight * 0.9)));
        }

        // 💡 시동 버튼 핸들러 강화
        document.getElementById('start-btn').addEventListener('click', async function() {
            const success = await initAudio();
            if (success) {
                if ('Accelerometer' in window) {
                    try {
                        const sensor = new Accelerometer({ frequency: 60 });
                        sensor.addEventListener('reading', () => {
                            if(!isPlaying) {
                                currentPitchRatio = Math.max(0, Math.min(1, 1 - Math.abs(Math.atan2(sensor.y, sensor.z) * (180 / Math.PI)) / 180));
                            }
                        });
                        sensor.start();
                    } catch(e) {}
                }
                isStarted = true;
                this.style.display = 'none';
                document.getElementById('face-container').style.visibility = 'visible';
                document.getElementById('face-container').style.opacity = '1';
            }
        });

        const onStart = (e) => {
            if (!isStarted) return;
            isPlaying = true;
            document.getElementById('face').classList.add('playing');
            masterGain.gain.setTargetAtTime(0.6, audioCtx.currentTime, 0.01);
            const move = e.touches ? e.touches[0] : e;
            handlePointer(move.clientX, move.clientY);
        };

        const onMove = (e) => {
            if (!isStarted || !isPlaying) return;
            const move = e.touches ? e.touches[0] : e;
            handlePointer(move.clientX, move.clientY);
        };

        const onEnd = () => {
            isPlaying = false;
            document.getElementById('face').classList.remove('playing');
            masterGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.02);
        };

        window.addEventListener('mousedown', onStart);
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onEnd);
        window.addEventListener('touchstart', (e) => { e.preventDefault(); onStart(e); }, { passive: false });
        window.addEventListener('touchmove', (e) => { e.preventDefault(); onMove(e); }, { passive: false });
        window.addEventListener('touchend', onEnd);

        // 눈금 생성
        const pb = document.getElementById('pitch-board');
        for (let m = MIN_MIDI; m <= MIN_MIDI + MIDI_RANGE; m++) { 
            let p = ((m - MIN_MIDI) / MIDI_RANGE) * 100;
            const t = document.createElement('div');
            t.className = 'tick'; t.style.bottom = p + '%';
            const m12 = m % 12;
            if (m12 === 0) t.classList.add('c-note');
            else if (![1, 3, 6, 8, 10].includes(m12)) t.classList.add('natural');
            
            if (t.classList.contains('natural') || t.classList.contains('c-note')) {
                const l = document.createElement('span');
                l.className = 'tick-label'; l.innerText = notesArr[m12] + (Math.floor(m / 12) - 1);
                t.appendChild(l);
            }
            pb.appendChild(t);
        }
    </script>
</body>
</html>
