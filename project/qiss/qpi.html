<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>QISS</title>
    <link rel="shortcut icon" type="image/x-icon" href="/logo.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    
    <style>
        @import url('https://fonts.cdnfonts.com/css/br-cobane');
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css');
        @import url('https://cdn.jsdelivr.net/gh/toss/tossface/dist/tossface.css');
        

        :root {
            --primary-color: #6366f1;
            --bg-color: #f9fafb;
            --text-color: #1f2937;
            --soft-gray: #e5e7eb;
            --accent-pink: #f472b6;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Pretendard Variable', "BR Cobane", sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        /* 배경 장식용 원 */
        .bg-deco {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.4;
        }
        .deco-1 { width: 300px; height: 300px; background: var(--primary-color); top: -100px; right: -50px; }
        .deco-2 { width: 250px; height: 250px; background: var(--accent-pink); bottom: -50px; left: -50px; }

        .container {
            max-width: 500px;
            padding: 40px 20px;
            animation: fadeIn 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .emoji {
            font-family: 'Tossface';
            font-size: 80px;
            margin-bottom: 24px;
            display: block;
        }

        h1 {
            font-family: "BR Cobane";
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .brand-old {
            text-decoration: line-through;
            color: #9ca3af;
            font-size: 0.9em;
        }

        .brand-new {
            color: var(--primary-color);
        
            font-family: 'Pretendard Variable', sans-serif;
            color: #282828;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #4b5563;
            margin-bottom: 32px;
        }

        .move-button {
            display: inline-block;
            background-color: var(--primary-color);
            color: white;
            padding: 16px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
            transition: all 0.3s ease;
        }

        .move-button:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.3);
            background-color: #4f46e5;
        }

        .move-button:active {
            transform: translateY(-1px);
        }

        .footer {
            position: absolute;
            allign-items: center;
            bottom: 30px;
            width: 100%;
            font-size: 0.85rem;
            color: #9ca3af;
        }

        /* 5초 뒤 자동 이동 안내 */
        .auto-redirect {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #6b7280;
        }
        
        #countdown {
            font-weight: 600;
            color: var(--primary-color);
        }
    </style>
</head>
<body>
    <div class="bg-deco deco-1"></div>
    <div class="bg-deco deco-2"></div>

    <div class="container">
        <span class="emoji">🌱</span>
        <h1><span class="brand-new">쿼터파이는 점검중!</span></h1>
        
        <p>
            지금 쿼터파이는 더 깊고 특별한 경험을 드리기 위해<br>잠시 점검 시간을 갖고 있어요 🔍💻✨<br><br>
            새로운 공간에서 펼쳐질 우리들의 이야기, 기대해 주실 거죠? 📖🎀✨<br>금방 돌아올게요! 🏃‍♂️💨💨
        </p>


    <div class="footer">
        2026 쿼터파이
    </div>
</body>
</html>
