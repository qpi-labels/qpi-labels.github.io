<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="manifest.json">
    <link rel="shortcut icon" type="image/x-icon" href="./logo.ico">
    
    <title>Dasein;</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    
    <script async src="https://cse.google.com/cse.js?cx=b794e851ac2524ee7"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>
    
    <!-- 캐시 갱신을 위해 버전 업그레이드 -->
    <link rel="stylesheet" href="style.css?v=1.2">
</head>
<body>
    <div class="paper-grain"></div>
    <div class="fixed-vertical-line"></div>

    <div class="layout-grid">
        
        <!-- 왼쪽 패널 -->
        <aside class="left-panel">
            <h1 class="main-title">Dasein;</h1>
            
            <div class="search-container">
                <div class="gcse-searchbox"></div>
            </div>

            <!-- AI 요약 컨테이너 -->
            <div id="ai-summary-container" style="display: none;">
                <div class="ai-summary-box">
                    <button id="btn-generate-summary" class="summary-badge" onclick="triggerSummary()">연구 주제 추천받기</button>
                    <!-- 스크롤 및 블러 효과 래퍼 -->
                    <div class="ai-summary-scroll-area">
                        <div id="ai-summary-content"></div>
                    </div>
                </div>
            </div>

            <!-- 하단 푸터 (VHS 스타일) -->
            <div class="vhs-footer">
                <div class="vhs-label-bar">
                    <span class="brand-name">쿼터파이</span>
                    <button class="since-btn" onclick="openApiModal()">
                        API <span id="api-status-indicator" style="margin-left:5px; font-size:10px;"></span>
                    </button>
                </div>
                <div class="vhs-stripes">
                    <div class="stripe s-3"></div>
                    <div class="stripe s-2"></div>
                    <div class="stripe s-1"></div>
                </div>
            </div>
        </aside>

        <!-- 오른쪽 패널 (검색 결과) -->
        <main class="right-panel">
            <div class="gcse-searchresults"></div>
        </main>

    </div>

    <!-- API 설정 모달 -->
    <div id="api-modal">
        <div class="modal-content">
            <div class="modal-header">API Key 설정</div>
            <div class="modal-body">
                <p style="margin-bottom: 15px; font-size: 0.95rem; line-height: 1.5;">
                    AI 연구 주제 추천 기능을 사용하려면 Groq API 키가 필요합니다.<br>
                    입력하신 키는 브라우저에만 저장됩니다.
                </p>
                <div class="api-input-group">
                    <input type="password" id="api-key-input" placeholder="gsk_...">
                </div>
            </div>
            <div class="modal-buttons">
                <button class="btn btn-outline" onclick="closeApiModal()">취소</button>
                <button class="btn btn-filled" onclick="saveApiKey()">저장</button>
            </div>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('서비스 워커 등록 성공!', reg))
                    .catch(err => console.error('서비스 워커 등록 실패:', err));
            });
        }
    </script>

    <script>
        marked.setOptions({ breaks: true, gfm: true });
        const GROQ_MODEL = 'meta-llama/llama-4-maverick-17b-128e-instruct'; 
        let currentQuery = '';
        let currentResults = [];

        function updateApiStatus() {
            const apiKey = localStorage.getItem('GROQ_API_KEY');
            document.getElementById('api-status-indicator').innerText = apiKey ? '🟢' : '⚙️';
        }

        function openApiModal() {
            const modal = document.getElementById('api-modal');
            const savedKey = localStorage.getItem('GROQ_API_KEY');
            if (savedKey) document.getElementById('api-key-input').value = savedKey;
            modal.style.display = 'flex';
        }

        function closeApiModal() { 
            document.getElementById('api-modal').style.display = 'none'; 
        }

        function saveApiKey() {
            const apiKey = document.getElementById('api-key-input').value.trim();
            if (apiKey) {
                localStorage.setItem('GROQ_API_KEY', apiKey);
                closeApiModal(); 
                updateApiStatus();
            } else { 
                alert('API 키를 입력해주세요.'); 
            }
        }

        function triggerSummary() {
            if (currentQuery && currentResults.length > 0) {
                generateSummary(currentQuery, currentResults);
            }
        }

        // AI 연구 주제 추천 생성 로직
        async function generateSummary(query, searchResults) {
            const GROQ_API_KEY = localStorage.getItem('GROQ_API_KEY');
            const summaryContent = document.getElementById('ai-summary-content');
            const summaryBtn = document.getElementById('btn-generate-summary');

            if (!GROQ_API_KEY) {
                summaryContent.innerHTML = '<p>AI 추천을 사용하려면 좌측 하단의 <strong>API</strong> 버튼을 눌러 키를 설정해주세요.</p>';
                return;
            }

            summaryBtn.innerText = '분석 중...';
            summaryBtn.disabled = true;
            summaryContent.innerHTML = '<div class="loading-spinner"></div><p style="display:inline-block; margin:0;">AI가 연구 동향을 파악하고 있습니다...</p>';
            
            try {
                let resultsContext = `검색어: ${query}\n\n`;
                searchResults.forEach((res, i) => { 
                    resultsContext += `${i + 1}. ${res.title}\n${res.snippet}\n\n`; 
                });
                
                // 프롬프트 전면 수정 (연구 조언가 컨셉)
                const systemPrompt = `당신은 뛰어난 학술 연구 조언가입니다. 제공된 검색 결과와 데이터를 바탕으로 다음 두 가지를 작성하세요:
1. 해당 주제의 핵심 개념 및 현재 학술적 동향에 대한 간략한 소개 (3~4문장 내외)
2. 고등학생이나 대학생이 소논문, 탐구보고서 등으로 진행하기 좋은 창의적이고 심도 있는 구체적인 [연구 주제 3~5가지] 추천

각 연구 주제에는 추천하는 이유와 구체적인 탐구 방향(어떤 지표를 볼 것인지 등)을 간략히 포함해주세요. 마크다운 문법을 사용하되, 불필요한 서론이나 인사말 없이 바로 본론으로 시작하세요.`;

                const response = await fetch(`https://api.groq.com/openai/v1/chat/completions`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json', 
                        'Authorization': `Bearer ${GROQ_API_KEY}` 
                    },
                    body: JSON.stringify({
                        model: GROQ_MODEL, 
                        messages: [
                            { role: 'system', content: systemPrompt },
                            { role: 'user', content: `검색어 "${query}"에 대한 학술 검색 결과들입니다:\n${resultsContext}` }
                        ],
                        temperature: 0.6, 
                        max_tokens: 2048, // 답변이 잘리지 않도록 토큰 확장
                    })
                });

                if (!response.ok) throw new Error('API 요청 실패');
                const data = await response.json();
                summaryContent.innerHTML = marked.parse(data.choices[0].message.content);

            } catch (error) {
                summaryContent.innerHTML = `<p>오류가 발생했습니다: ${error.message}</p>`;
            } finally {
                summaryBtn.innerText = '다시 추천받기';
                summaryBtn.disabled = false;
            }
        }

        // 검색 결과 감지 및 데이터 추출량 증가
        const resultsObserver = new MutationObserver(() => {
            const results = document.querySelectorAll('.gsc-webResult.gsc-result');
            const searchInput = document.querySelector('input.gsc-input');
            const query = searchInput ? searchInput.value.trim() : '';

            if (results.length > 0 && query && query !== currentQuery) {
                currentQuery = query;
                
                // 상위 5개가 아닌 페이지 전체 검색 결과(보통 10개)를 모두 AI에게 전달하도록 변경
                currentResults = Array.from(results).map(el => ({
                    title: el.querySelector('.gs-title')?.textContent.trim() || '',
                    snippet: el.querySelector('.gs-snippet')?.textContent.trim() || ''
                })).slice(0, 10);

                const container = document.getElementById('ai-summary-container');
                container.style.display = 'block';
                document.getElementById('ai-summary-content').innerHTML = '<p style="padding: 10px 0;">위쪽 <strong>연구 주제 추천받기</strong> 버튼을 눌러보세요.</p>';
                document.getElementById('btn-generate-summary').innerText = '연구 주제 추천받기';
            }
        });
        resultsObserver.observe(document.body, { childList: true, subtree: true });

        // 불필요한 구글 UI 및 로고 제거 등
        const uiCleanerObserver = new MutationObserver(() => {
            const junkSelectors = ['.gsc-branding', '.gcsc-branding', '.gsc-watermark', '.gsc-tabsArea', '.gsc-above-wrapper-area', '.gsc-adBlock', '.gsc-orderby-container'];
            junkSelectors.forEach(sel => {
                document.querySelectorAll(sel).forEach(el => {
                    el.style.setProperty('display', 'none', 'important');
                    if(el.parentNode) el.parentNode.removeChild(el); 
                });
            });

            const searchInput = document.querySelector('input.gsc-input');
            if(searchInput) searchInput.style.setProperty('background-image', 'none', 'important');

            document.querySelectorAll('.gsc-webResult.gsc-result').forEach(card => {
                if (!card.dataset.clickable) {
                    card.dataset.clickable = "true";
                    card.style.cursor = 'pointer';
                    card.addEventListener('click', function(e) {
                        if(window.getSelection().toString().length > 0) return;
                        if(e.target.tagName !== 'A') {
                            const link = this.querySelector('.gs-title a');
                            if(link) link.click();
                        }
                    });
                }
            });

            document.querySelectorAll('.gsc-webResult.gsc-result .gs-title a').forEach(link => {
                if (!link.querySelector('.custom-favicon')) {
                    try {
                        const domain = new URL(link.href).hostname;
                        const favicon = document.createElement('img');
                        favicon.className = 'custom-favicon';
                        favicon.src = `https://www.google.com/s2/favicons?domain=${domain}&sz=32`;
                        link.insertBefore(favicon, link.firstChild);
                    } catch (e) {}
                }
            });
        });
        uiCleanerObserver.observe(document.body, { childList: true, subtree: true });

        window.addEventListener('DOMContentLoaded', updateApiStatus);
    </script>
</body>
</html>
